name: Update Server Status

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  update-status:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Get server status
        run: |
          curl -s "https://api.mcsrvstat.us/2/188.127.241.222:25601" > server-status.json
      
      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add server-status.json
          git commit -m "Auto-update server status [skip ci]" || echo "No changes to commit"
          git push